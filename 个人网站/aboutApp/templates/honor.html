{% extends 'base.html' %}

{% block title %} - 荣誉经历{% endblock %}

{% block content %}
<section class="page-hero compact">
    <div class="container">
        <span class="eyebrow">Experience</span>
        <h1>荣誉与经历</h1>
        <p>竞赛、工程实践和社会实践共同构成当前的能力积累。</p>
    </div>
</section>

<section class="section-wrap">
    <div class="container">
        <div class="section-heading">
            <span>Milestones</span>
            <h2>近期成果</h2>
            <p>按竞赛、工程实践和社会实践整理当前最能代表能力积累的经历。</p>
        </div>
        <div class="row timeline-list">
            {% for item in achievements %}
            <div class="col-md-4">
                <article class="timeline-card">
                    <span class="timeline-dot"></span>
                    <h2>{{ item.title }}</h2>
                    <p>{{ item.desc }}</p>
                </article>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
